<!DOCTYPE html>
<html>
<head>
    <title>Breast Cancer Prediction</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            padding:20px;
        }

        .container{
            max-width:1000px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            color:#333;
        }

        .grid{
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:10px;
        }

        input{
            padding:10px;
            width:100%;
        }

        button{
            margin-top:20px;
            width:100%;
            padding:12px;
            background:#007bff;
            color:white;
            border:none;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        .result{
            text-align:center;
            margin-top:20px;
            font-size:22px;
            font-weight:bold;
            color:green;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Breast Cancer Prediction System</h1>

    <form action="/predict" method="post">

        <div class="grid">

            <input type="number" step="any" name="f1" placeholder="radius_mean" required>
            <input type="number" step="any" name="f2" placeholder="texture_mean" required>
            <input type="number" step="any" name="f3" placeholder="perimeter_mean" required>

            <input type="number" step="any" name="f4" placeholder="area_mean" required>
            <input type="number" step="any" name="f5" placeholder="smoothness_mean" required>
            <input type="number" step="any" name="f6" placeholder="compactness_mean" required>

            <input type="number" step="any" name="f7" placeholder="concavity_mean" required>
            <input type="number" step="any" name="f8" placeholder="concave_points_mean" required>
            <input type="number" step="any" name="f9" placeholder="symmetry_mean" required>

            <input type="number" step="any" name="f10" placeholder="fractal_dimension_mean" required>
            <input type="number" step="any" name="f11" placeholder="radius_se" required>
            <input type="number" step="any" name="f12" placeholder="texture_se" required>

            <input type="number" step="any" name="f13" placeholder="perimeter_se" required>
            <input type="number" step="any" name="f14" placeholder="area_se" required>
            <input type="number" step="any" name="f15" placeholder="smoothness_se" required>

            <input type="number" step="any" name="f16" placeholder="compactness_se" required>
            <input type="number" step="any" name="f17" placeholder="concavity_se" required>
            <input type="number" step="any" name="f18" placeholder="concave_points_se" required>

            <input type="number" step="any" name="f19" placeholder="symmetry_se" required>
            <input type="number" step="any" name="f20" placeholder="fractal_dimension_se" required>
            <input type="number" step="any" name="f21" placeholder="radius_worst" required>

            <input type="number" step="any" name="f22" placeholder="texture_worst" required>
            <input type="number" step="any" name="f23" placeholder="perimeter_worst" required>

            <input type="number" step="any" name="f24" placeholder="area_worst" required>
            <input type="number" step="any" name="f25" placeholder="smoothness_worst" required>
            <input type="number" step="any" name="f26" placeholder="compactness_worst" required>

            <input type="number" step="any" name="f27" placeholder="concavity_worst" required>
            <input type="number" step="any" name="f28" placeholder="concave_points_worst" required>
            <input type="number" step="any" name="f29" placeholder="symmetry_worst" required>

            <input type="number" step="any" name="f30" placeholder="fractal_dimension_worst" required>

        </div>

        <button type="submit">Predict</button>

    </form>

    <div class="result">
        {{ prediction_text }}
    </div>

</div>

</body>
</html>
